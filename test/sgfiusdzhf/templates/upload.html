<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FileFlow — Upload</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --accent2: #ff4766;
      --text: #f0f0f0;
      --muted: #666;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    header {
      margin-bottom: 3rem;
      animation: slideDown 0.6s ease both;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    .logo span { color: var(--accent); }

    .tagline {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem;
      animation: slideUp 0.6s 0.1s ease both;
    }

    .step-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .step-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-bottom: 2rem;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(232, 255, 71, 0.03);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
      transition: transform 0.3s;
    }

    .drop-zone:hover .drop-icon {
      transform: translateY(-4px);
    }

    .drop-text {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .drop-text strong {
      color: var(--text);
    }

    .file-chosen {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(232,255,71,0.08);
      border: 1px solid rgba(232,255,71,0.3);
      font-size: 0.8rem;
      color: var(--accent);
      word-break: break-all;
    }

    /* Form fields */
    .field {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    textarea { min-height: 80px; }

    /* Submit button */
    .btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #000;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn:hover { background: #d4eb30; }
    .btn:active { transform: scale(0.99); }

    .btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* Corner decoration */
    .corner {
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--accent);
      border-style: solid;
    }
    .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="logo">File<span>Flow</span></div>
      <div class="tagline">// Secure file transfer utility v1.0</div>
    </header>

    <div class="card" style="position:relative;">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="step-label">Step 01 — Upload</div>

      <form method="post" action="/upload" enctype="multipart/form-data" id="uploadForm">

        <div class="drop-zone" id="dropZone">
          <input type="file" name="file" id="fileInput" required />
          <span class="drop-icon">⬆</span>
          <div class="drop-text">
            <strong>Drop your file here</strong><br/>
            or click to browse — any format accepted
          </div>
          <div class="file-chosen" id="fileChosen"></div>
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea name="description" id="description" placeholder="What is this file about? (optional)"></textarea>
        </div>

        <div class="field">
          <label for="tags">Tags</label>
          <input type="text" name="tags" id="tags" placeholder="e.g. report, q3, final (comma-separated)" />
        </div>

        <button type="submit" class="btn" id="submitBtn" disabled>
          Upload &amp; Continue →
        </button>
      </form>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileChosen = document.getElementById('fileChosen');
    const submitBtn = document.getElementById('submitBtn');
    const dropZone = document.getElementById('dropZone');

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        const f = fileInput.files[0];
        fileChosen.style.display = 'block';
        fileChosen.textContent = `✓  ${f.name}  (${(f.size / 1024).toFixed(1)} KB)`;
        submitBtn.disabled = false;
      }
    });

    ['dragover', 'dragenter'].forEach(e => {
      dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('drag-over'); });
    });
    ['dragleave', 'drop'].forEach(e => {
      dropZone.addEventListener(e, () => dropZone.classList.remove('drag-over'));
    });

    document.getElementById('uploadForm').addEventListener('submit', () => {
      submitBtn.textContent = 'Uploading…';
      submitBtn.disabled = true;
    });
  </script>
</body>
</html>
